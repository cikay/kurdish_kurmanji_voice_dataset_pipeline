stages:
  - acquire

acquire:
  sources:
    # web_scrape — single playlist item
    - audio:
        strategy: youtube_playlist
        playlist_url: https://www.youtube.com/playlist?list=PLXRqvgEq6VESn7sQzzmaXp_r3H6stjri6
      text:
        strategy: web_scrape
        base_url: https://botantimes.com/
        endpoint_method: slugify-audio-name
        endpoint_method_fallbacks:
          - slugify-after-slash

    # video_of_audio_url — single explicit video
    - audio:
        strategy: youtube_videos
        urls:
          https://www.youtube.com/watch?v=8_o_B68uOkU
      text:
        strategy: video_of_audio_url

  language: kmr_Latn
  min_lang_confidence: 0.60
  output_dir: dataset/debug
